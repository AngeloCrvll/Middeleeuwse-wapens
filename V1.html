<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weapons</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <section class="explanation">
                <h1>Longsword</h1>
                <p>The longsword was a versatile two-handed weapon used across Europe between the 13th and 16th centuries. It was effective in both armored and unarmored combat.</p>
            </section>
            
            <div class="horizontalLine"></div>

            <div class="TreeD"></div>
        </div>

        <div class="verticalLine"></div>

        <div class="right">
            <section class="controls">
                <div class="control">
                    <img class="hand" src="img/point.svg" alt="">
                    <h2>Point to rotate the object</h2>
                </div>
                <div class="control">
                    <img class="hand" src="img/fist.svg" alt="">
                    <h2>Make a fist to stop</h2>
                </div>
            </section>

            <div class="horizontalLine"></div>
            
            <h2 class="select">Select your preferred weapon</h2>

            <section class="choices">
                <div class="choice">
                    <img class="hand" src="img/1.svg" alt="">
                    <div class="img"></div>
                    <img class="eye" src="img/eye.svg" alt="">
                </div>
                <div class="choice">
                    <img class="hand" src="img/2.svg" alt="">
                    <div class="img"></div>
                    <img class="eye" src="img/eye.svg" alt="">
                </div>
                <div class="choice">
                    <img class="hand" src="img/3.svg" alt="">
                    <div class="img"></div>
                    <img class="eye" src="img/eye.svg" alt="">
                </div>
            </section>
        </div>
    </div>
</body>
</html>
